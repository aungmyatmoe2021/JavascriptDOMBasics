<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>002 Get Element By ID : DOM</title>
  </head>
  <body>
    <h1 id="header">This is heading....</h1>
    <script>
      setTimeout(() => {
        document.getElementById("header").innerText =
          "This is heading change from 10 seconds ...........";
      }, 10000);
    </script>
  </body>
</html>
